<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="My web apps — Mark Maga." />
  <meta name="theme-color" content="#06080d" />
  <title>Mark Maga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>My web apps.</h1>
    </header>

    <main>
      <ul class="grid">
        <li>
          <a class="card" href="https://moon-phase-app-gamma.vercel.app" data-app="moon-phase-app" aria-label="Today's Moon">
            <span class="card-media card-media--square">
              <img
                src="images/moon-phase-app.webp?v=2"
                alt=""
                width="720"
                height="720"
                loading="lazy"
                decoding="async"
              />
              <span class="card-overlay" aria-hidden="true">
                <span class="card-cta">Open app</span>
              </span>
            </span>
          </a>
        </li>

        <li>
          <a class="card" href="https://solar-light-app.vercel.app" data-app="solar-light-app" aria-label="Solar Light">
            <span class="card-media card-media--square">
              <img
                src="images/solar-light-app.webp"
                alt=""
                width="720"
                height="720"
                loading="lazy"
                decoding="async"
              />
              <span class="card-overlay" aria-hidden="true">
                <span class="card-cta">Open app</span>
              </span>
            </span>
          </a>
        </li>

        <li>
          <a class="card" href="https://moon-phase-beta-five.vercel.app" data-app="moon-phase-beta" aria-label="The Moon">
            <span class="card-media card-media--square">
              <img
                src="images/moon-phase-beta.webp"
                alt=""
                width="720"
                height="720"
                loading="lazy"
                decoding="async"
              />
              <span class="card-overlay" aria-hidden="true">
                <span class="card-cta">Open app</span>
              </span>
            </span>
          </a>
        </li>

        <li>
          <a class="card" href="https://satellite-app-wheat.vercel.app" data-app="orbital-view" aria-label="Orbital View">
            <span class="card-media card-media--square">
              <img
                src="images/orbital-view.webp"
                alt=""
                width="720"
                height="720"
                loading="lazy"
                decoding="async"
              />
              <span class="card-overlay" aria-hidden="true">
                <span class="card-cta">Open app</span>
              </span>
            </span>
          </a>
        </li>

        <li>
          <a class="card" href="https://elevation-kappa.vercel.app" data-app="us-elevation-map" aria-label="US Elevation Map">
            <span class="card-media card-media--square">
              <img
                src="images/us-elevation-map.webp"
                alt=""
                width="720"
                height="720"
                loading="lazy"
                decoding="async"
              />
              <span class="card-overlay" aria-hidden="true">
                <span class="card-cta">Open app</span>
              </span>
            </span>
          </a>
        </li>
      </ul>
    </main>

    <footer class="footer">
      <p>More coming soon.</p>
    </footer>
  </div>
</body>
</html>
